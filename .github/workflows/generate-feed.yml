name: Generate Supplemental Feed

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch latest Ecwid feed
        run: |
          curl -L "https://d2hku29108hzuu.cloudfront.net/product_feed/77567544/google_shopping/bapCC3RJp2vFqmkt.xml" -o primary_feed.xml
          echo "Feed fetched OK"
      - name: Generate supplemental feed XML
        run: python generate_supplemental_feed.py
      - name: Commit and push updated XML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supplemental_feed.xml
          git diff --staged --quiet || git commit -m "chore: auto-update supplemental feed"
          git push
